# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "gameforge"
primary_region = "fra"  # Frankfurt - closest to Croatia

[build]

[env]
  NODE_ENV = "production"
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "gameforge_data"
  destination = "/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
